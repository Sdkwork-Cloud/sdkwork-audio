# SDKWork Audio API Nginx Configuration

upstream audio_api {
    server audio-api:8080;
}

server {
    listen 80;
    server_name audio-api.sdkwork.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name audio-api.sdkwork.com;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/audio-api.crt;
    ssl_certificate_key /etc/nginx/ssl/audio-api.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Logging
    access_log /var/log/nginx/audio-api.access.log;
    error_log /var/log/nginx/audio-api.error.log;

    # Request size limit
    client_max_body_size 100M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # App API routes
    location /app/v3/api/audio/ {
        proxy_pass http://audio_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Access-Token, Content-Type, X-Idempotency-Key";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Backend API routes
    location /backend/v3/api/audio/ {
        proxy_pass http://audio_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket routes for real-time
    location /app/v3/api/audio/realtime/ {
        proxy_pass http://audio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://audio_api;
        proxy_set_header Host $host;
    }

    # Deny all other locations
    location / {
        return 404;
    }
}
