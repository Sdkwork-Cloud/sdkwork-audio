apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-audio-api
  namespace: sdkwork
  labels:
    app: sdkwork-audio-api
    version: v0.1.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sdkwork-audio-api
  template:
    metadata:
      labels:
        app: sdkwork-audio-api
        version: v0.1.0
    spec:
      containers:
        - name: audio-api
          image: sdkwork/audio-api:0.1.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: RUST_LOG
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: audio-secrets
                  key: database-url
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8080"
            - name: DRIVE_BASE_URL
              value: "http://drive-api.sdkwork.svc.cluster.local:8081"
            - name: IAM_BASE_URL
              value: "http://iam-api.sdkwork.svc.cluster.local:8082"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: audio-data
              mountPath: /app/data
      volumes:
        - name: audio-data
          persistentVolumeClaim:
            claimName: audio-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sdkwork-audio-api
  namespace: sdkwork
  labels:
    app: sdkwork-audio-api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: sdkwork-audio-api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audio-data-pvc
  namespace: sdkwork
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: audio-secrets
  namespace: sdkwork
type: Opaque
stringData:
  database-url: "sqlite:/app/data/audio.db"
